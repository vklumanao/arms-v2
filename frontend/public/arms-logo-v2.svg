<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <!-- ARMS Logo: Affiliation and Research Management System -->
  
  <!-- Professional Color Palette -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Interconnected Nodes / Lifecycle System -->
  <g transform="translate(40, 40)">
    <!-- Outer Structured Frame (Shield/Circle) -->
    <circle cx="60" cy="60" r="54" fill="none" stroke="#1E3A8A" stroke-width="4" stroke-opacity="0.2"/>
    <path d="M60 6 A 54 54 0 0 1 114 60" fill="none" stroke="#14B8A6" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Interconnected Nodes (Proposal, Review, Progress, Publication) -->
    <circle cx="60" cy="15" r="7" fill="#1E3A8A" /> <!-- Top: Proposal -->
    <circle cx="105" cy="60" r="7" fill="#14B8A6" /> <!-- Right: Review -->
    <circle cx="60" cy="105" r="7" fill="#1E3A8A" /> <!-- Bottom: Progress -->
    <circle cx="15" cy="60" r="7" fill="#14B8A6" /> <!-- Left: Publication -->
    
    <!-- Connecting Workflow Lines -->
    <path d="M60 22 L 60 45 M 60 75 L 60 98 M 22 60 L 45 60 M 75 60 L 98 60" 
          stroke="#1E3A8A" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
    
    <!-- Central Management Hub -->
    <rect x="42" y="42" width="36" height="36" rx="6" fill="#1E3A8A" />
    <path d="M50 60 L 56 66 L 70 52" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Typography Section -->
  <g transform="translate(180, 105)">
    <!-- ARMS: Modern Sans-Serif Wordmark -->
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="72" fill="#1E3A8A" letter-spacing="1">ARMS</text>
    
    <!-- Tagline: Institutional Subtitle -->
    <text x="2" y="38" font-family="Arial, Helvetica, sans-serif" font-weight="500" font-size="16" fill="#374151" text-transform="uppercase" letter-spacing="0.5">Affiliation and Research Management System</text>
    
    <!-- Subtle Accent Line -->
    <rect x="0" y="15" width="220" height="2" fill="#14B8A6" opacity="0.3" />
  </g>
</svg>
